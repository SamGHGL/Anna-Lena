<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warum ich dich liebe ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ff9fb2, #ee9ca7);
      color: #4a0e23;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      margin-top: 80px;
      padding: 40px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      width: 85%;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    ul {
      text-align: left;
      font-size: 1.4rem;
      line-height: 2;
      list-style: none;
      padding: 0;
    }

    li::before {
      content: "❤️ ";
    }

    .heart {
      position: fixed;
      bottom: -20px;
      color: #ff2d55;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0); opacity: 0.8; }
      100% { transform: translateY(-120vh) translateX(40px); opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container" id="box">
    <h1>Warum ich dich liebe ❤️</h1>

    <ul id="list"></ul>

      heart.style.fontSize = (15 + Math.random() * 25) + "px";
      heart.style.animationDuration = (5 + Math.random() * 5) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 12000);
    }

    window.addEventListener("load", () => {

      let i = 0;
      function addReason() {
        if (i < reasons.length) {
          const li = document.createElement("li");
          li.textContent = reasons[i];
          list.appendChild(li);
          i++;
          setTimeout(addReason, 200);
        }
      }

      setTimeout(addReason, 500);
