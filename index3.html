<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warum ich dich liebe ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ff9fb2, #ee9ca7);
      color: #4a0e23;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      margin-top: 80px;
      padding: 40px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      width: 85%;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    ul {
      text-align: left;
      font-size: 1.4rem;
      line-height: 2;
      list-style: none;
      padding: 0;
    }

    li::before {
      content: "❤️ ";
    }

    .heart {
      position: fixed;
      bottom: -20px;
      color: #ff2d55;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0); opacity: 0.8; }
      100% { transform: translateY(-120vh) translateX(40px); opacity: 0; }
    }

    /* Animierte Buttons */
    #decisionButtons {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 1s ease;
      margin-top: 40px;
    }

    #decisionButtons.show {
      opacity: 1;
      transform: translateY(0);
    }

    .choice-button {
      padding: 15px 40px;
      margin: 10px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ff6b9d, #ff2d55);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 8px 25px rgba(255, 45, 85, 0.4);
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      letter-spacing: 1px;
    }

    .choice-button:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 35px rgba(255, 45, 85, 0.6);
    }
  </style>
</head>

<body>

  <div class="container" id="box">
    <h1>Warum ich dich liebe ❤️</h1>

    <ul id="list"></ul>

    <div id="decisionButtons">
  <button class="choice-button" onclick="window.location.href='index4_yes.html'">Ja ❤️</button>
  <button class="choice-button" onclick="window.location.href='index5_no.html'">Nein 💔</button>
    </div>

    
  </div>

  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (15 + Math.random() * 25) + "px";
      heart.style.animationDuration = (5 + Math.random() * 5) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 12000);
    }
    setInterval(createHeart, 300);

    const reasons = [
      "Weil du mich zum Lächeln bringst.",
      "Weil du mein Herz wärmer machst.",
      "Weil du mich verstehst.",
      "Weil du mich glücklich machst.",
      "Weil du wunderschön bist.",
      "Weil du mich motivierst.",
      "Weil du mir Ruhe gibst.",
      "Weil du mir Kraft gibst.",
      "Weil du mein Lieblingsmensch bist.",
      "Weil du alles besser machst.",
      "Weil du einzigartig bist.",
      "Weil du mein Herz bist.",
      "Weil du mich komplett machst.",
      "Weil du mir fehlst, selbst wenn du da bist.",
      "Weil du mein Zuhause bist.",
      "Weil ich bei dir ich selbst sein kann.",
      "Weil du mich nie verurteilst.",
      "Weil du mich immer unterstützt.",
      "Weil du mich stolz machst.",
      "Weil du mich zum Träumen bringst.",
      "Weil du mir Sicherheit gibst.",
      "Weil du mich beruhigst.",
      "Weil du mich zum Lachen bringst.",
      "Weil du mich herausforderst.",
      "Weil du mich inspirierst.",
      "Weil du mich stärker machst.",
      "Weil du mich weich machst.",
      "Weil du mich verstehst, ohne dass ich etwas sage.",
      "Weil du mir zuhörst.",
      "Weil du mich ernst nimmst.",
      "Weil du mich akzeptierst.",
      "Weil du mich glücklich machst, ohne es zu versuchen.",
      "Weil du mich zum Besseren veränderst.",
      "Weil du mein Herz schneller schlagen lässt.",
      "Weil du mein Herz beruhigst.",
      "Weil du mein Lieblingsgedanke bist.",
      "Weil du mein erster Gedanke am Morgen bist.",
      "Weil du mein letzter Gedanke am Abend bist.",
      "Weil du mein Alltag schöner machst.",
      "Weil du mein Leben bunter machst.",
      "Weil du mein Leben leichter machst.",
      "Weil du mein Leben besser machst.",
      "Weil du mein Leben bist.",
      "Weil du mich anschaust, als wäre ich wichtig.",
      "Weil du mich beruhigst, selbst wenn ich Chaos bin.",
      "Weil du mich siehst.",
      "Weil du mich nie aufgibst.",
      "Weil du mich nie ersetzt.",
      "Weil du mich nie vergisst.",
      "Weil du mich nie verletzt.",
      "Weil du mich nie enttäuschst.",
      "Weil du mich nie alleine lässt.",
      "Weil du mich nie im Stich lässt.",
      "Weil du mich nie loslässt.",
      "Weil du mich nie klein machst.",
      "Weil du mich nie belächelst.",
      "Weil du mich nie austauschst.",
      "Weil du mich nie verstellst.",
      "Weil du mich nie fallen lässt.",
      "Weil du mich nie im Regen stehen lässt.",
      "Weil du mich nie ignorierst.",
      "Weil ich dich liebe."
    ];

    window.addEventListener("load", () => {
      document.getElementById("box").style.opacity = 1;

      const list = document.getElementById("list");
      const buttons = document.getElementById("decisionButtons");

      let i = 0;
      function addReason() {
        if (i < reasons.length) {
          const li = document.createElement("li");
          li.textContent = reasons[i];
          list.appendChild(li);
          i++;
          setTimeout(addReason, 200);
        } else {
          buttons.classList.add("show");
        }
      }

      setTimeout(addReason, 500);
    });
  </script>

</body>
</html>
