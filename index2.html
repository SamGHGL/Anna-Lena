<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I love u ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ff9fb2, #ff6b9d, #ff2d55);
      color: white;
      text-align: center;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .container {
      margin-top: 120px;
      padding: 40px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      width: 80%;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    h1, h3, h5 {
      text-shadow: 0 5px 20px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 1s ease;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    h3 {
      font-size: 2rem;
      margin-top: 20px;
    }

    h5 {
      font-size: 1.6rem;
      margin-top: 20px;
    }

    .typewriter {
      font-size: 1.4rem;
      line-height: 1.7;
      white-space: pre-wrap;
      opacity: 0;
      transition: opacity 1s ease;
      margin-top: 20px;
    }

    .heart {
      position: fixed;
      bottom: -20px;
      color: #fff;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0); opacity: 0.8; }
      100% { transform: translateY(-120vh) translateX(40px); opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container" id="box">
    <h1 id="title">Teil 2 ❤️</h1>

    <h3 id="frage"></h3>

    <h5 id="antwort"></h5>

    <div id="antwort-explanation" class="typewriter"></div>
  </div>

  <script>
    // Floating hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (15 + Math.random() * 25) + "px";
      heart.style.animationDuration = (5 + Math.random() * 5) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 12000);
    }
    setInterval(createHeart, 300);

    // Schreibmaschinen-Funktion mit Callback
    function typeWriter(element, text, speed = 40, callback = null) {
      element.style.opacity = 1;
      let i = 0;

      function typing() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        } else {
          if (callback) callback();
        }
      }
      typing();
    }

    // Texte
    const frageText = "🗣️: Würdest du nochmal mit ihr zusammen sein?";
    const antwortText = "Ja, jederzeit ❤️";
    const explanationText = "Weil sie das Beste ist, was dir passieren konnte.";

    // Start Animation
    window.addEventListener("load", () => {
      const box = document.getElementById("box");
      const title = document.getElementById("title");
      const frage = document.getElementById("frage");
      const antwort = document.getElementById("antwort");
      const explanation = document.getElementById("antwort-explanation");

      // Box einblenden
      box.style.opacity = 1;

      // 1. Titel einblenden
      setTimeout(() => {
        title.style.opacity = 1;

        // 2. Frage tippen
        typeWriter(frage, frageText, 40, () => {

          // 3. Antwort tippen (erst wenn Frage fertig)
          typeWriter(antwort, antwortText, 40, () => {

            // 4. Erklärung tippen (erst wenn Antwort fertig)
            typeWriter(explanation, explanationText, 40);

          });

        });

      }, 300);
    });
  </script>

</body>
</html>
