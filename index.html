<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Für dich ❤️</title>

  <style>
    * {
      perspective: 1000px;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ffdde1 0%, #ff9fb2 25%, #ee9ca7 50%, #f48fa7 75%, #ff6b9d 100%);
      background-attachment: fixed;
      color: #4a0e23;
      overflow-x: hidden;
      min-height: 300vh;
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      opacity: 0;
      transition: opacity 1s ease;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      letter-spacing: 2px;
      margin: 0;
    }

    h3, h4, h5 {
      text-align: center;
      margin: 40px auto;
      opacity: 0;
      transition: opacity 1s ease;
      transform: translateZ(150px);
      text-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      letter-spacing: 1px;
    }

    h3 {
      font-size: 2.2rem;
      font-weight: 700;
    }

    h4 {
      font-size: 1.8rem;
    }

    h5 {
      font-size: 1.6rem;
      font-weight: 600;
    }

    .typewriter {
      max-width: 600px;
      width: 90%;
      font-size: 1.4rem;
      text-align: center;
      line-height: 1.8;
      min-height: 120px;
      opacity: 0;
      white-space: pre-wrap;
      transition: opacity 1s ease;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin: 20px auto;
    }

    /* Scroll-Pfeil */
    #arrow {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3rem;
      animation: bounce 1.5s infinite ease-in-out, glow 2s infinite;
      opacity: 1;
      transition: opacity 0.5s ease;
      z-index: 10;
      filter: drop-shadow(0 0 10px rgba(255, 45, 85, 0.6));
    }

    @keyframes bounce {
      0% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
      100% { transform: translateX(-50%) translateY(0); }
    }

    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 45, 85, 0.4)); }
      50% { filter: drop-shadow(0 0 20px rgba(255, 45, 85, 0.8)); }
    }

    /* Floating hearts */
    .heart {
      position: fixed;
      bottom: -20px;
      color: #ff2d55;
      font-size: 20px;
      animation: floatUp 6s linear infinite, pulse 0.8s ease-in-out infinite;
      opacity: 0.8;
      z-index: 5;
      filter: drop-shadow(0 0 5px rgba(255, 45, 85, 0.5));
    }

    @keyframes floatUp {
      0% { 
        transform: translateY(0) translateX(0) scale(0.5);
        opacity: 0.8;
      }
      50% {
        transform: translateY(-60vh) translateX(40px) scale(1);
      }
      100% { 
        transform: translateY(-120vh) translateX(40px) scale(0.5);
        opacity: 0;
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.1), transparent);
      pointer-events: none;
    }

    .answer-explanation {
      margin-top: 30px;
      font-size: 1.1rem;
      max-width: 600px;
    }

    /* Erste Box - zentriert */
    .intro-section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Glasmorphism Container */
    .glass-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      max-width: 700px;
      width: 90%;
    }

    /* 3D Hover Effekt */
    h3:hover, h5:hover {
      transform: translateZ(200px) rotateY(5deg);
      text-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>

  <div class="intro-section">
    <div class="glass-container">
      <h1 id="title">Für dich ❤️</h1>
      <div id="text1" class="typewriter"></div>
    </div>
  </div>

  <!-- Scroll-Pfeil -->
  <div id="arrow">⬇️</div>

  <!-- Frage -->
  <div class="section">
    <div class="glass-container">
      <h3 id="frage"></h3>
    </div>
  </div>

  <!-- Antwort -->
  <div class="section">
    <div class="glass-container">
      <h5 id="antwort"></h5>
      <div id="antwort-explanation" class="typewriter answer-explanation"></div>
    </div>
  </div>

  <script>
    // Floating hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (15 + Math.random() * 25) + "px";
      heart.style.animationDuration = (5 + Math.random() * 5) + "s";
      heart.style.animationDelay = Math.random() * 0.5 + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 12000);
    }
    setInterval(createHeart, 300);

    // Parallax Effekt für Hearts
    window.addEventListener("scroll", () => {
      const hearts = document.querySelectorAll(".heart");
      hearts.forEach(heart => {
        heart.style.transform = `translateY(${window.scrollY * 0.1}px)`;
      });
    });

    // Schreibmaschinen-Funktion
    function typeWriter(element, text, speed = 40) {
      element.style.opacity = 1;
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        }
      }
      typing();
    }

    // Intro-Text
    const introText =
      "Diese kleine Website habe ich nur für dich gemacht.\n" +
      "Weil du mir wichtig bist. Weil du mein Herz schneller schlagen lässt.\n" +
      "Und weil ich dir zeigen wollte, wie viel du mir bedeutest.";

    window.addEventListener("load", () => {
      document.getElementById("title").style.opacity = 1;
      setTimeout(() => {
        typeWriter(document.getElementById("text1"), introText);
      }, 800);
    });

    // Scroll-Pfeil ausblenden
    const arrow = document.getElementById("arrow");
    window.addEventListener("scroll", () => {
      arrow.style.opacity = window.scrollY > 50 ? "0" : "1";
    });

    // Frage & Antwort beim Scrollen tippen
    let frageGetippt = false;
    let antwortGetippt = false;

    window.addEventListener("scroll", () => {
      const scroll = window.scrollY;
      const height = window.innerHeight;

      if (scroll > height * 0.4 && !frageGetippt) {
        frageGetippt = true;
        typeWriter(
          document.getElementById("frage"),
          "Was war der schönste Tag deines Lebens?"
        );
      }

      if (scroll > height * 1.4 && !antwortGetippt) {
        antwortGetippt = true;
        typeWriter(
          document.getElementById("antwort"),
          "Sonntag, 1. Mai ❤️"
        );
        setTimeout(() => {
          typeWriter(
            document.getElementById("antwort-explanation"),
            "Der Tag, an dem wir zusammengekommen sind"
          );
        }, 800);
      }
    });

    // 3D Mauseffekt - nur für h3 und h5
    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;
      
      document.querySelectorAll("h3, h5").forEach(el => {
        el.style.transform = `translateZ(150px) rotateX(${y * 5}deg) rotateY(${x * 5}deg)`;
      });
    });

    // 3D Transform zurücksetzen, wenn Maus das Fenster verlässt
    document.addEventListener("mouseleave", () => {
      document.querySelectorAll("h3, h5").forEach(el => {
        el.style.transform = "translateZ(150px) rotateX(0deg) rotateY(0deg)";
      });
    });
  </script>

</body>
</html>
