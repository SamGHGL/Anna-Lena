<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meine erste GitHub‑Pages‑Website</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: linear-gradient(180deg, #000, #222);
        color: white;
        height: 200vh;
      }
      header {
        position: sticky;
        top: 0;
        background: rgba(0, 0, 0, 0.7);
        padding: 1rem;
        text-align: center;
        font-size: 1.5rem;
      }
      .hero {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        transform: translateZ(0);
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <header>Willkommen auf meiner Seite</header>
    <div class="hero" id="hero">Scroll mich!</div>

    <script>
      window.addEventListener("scroll", () => {
        const scroll = window.scrollY;
        const hero = document.getElementById("hero");
        hero.style.transform = `translateY(${scroll * 0.3}px) rotateY(${scroll * 0.2}deg)`;
      });
    </script>
  </body>
</html>
