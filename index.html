<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Für dich ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #ffdde1, #ee9ca7);
      color: #4a0e23;
      overflow-x: hidden;
    }

    .typewriter {
      width: 80%;
      margin: 40px auto;
      font-size: 1.4rem;
      text-align: center;
      line-height: 1.6;
      min-height: 120px;
      opacity: 0;
      transition: opacity 1s ease;
      white-space: pre-wrap;
    }

    h1 {
      text-align: center;
      margin-top: 80px;
      font-size: 3rem;
      opacity: 0;
      transition: opacity 1s ease;
    }

    /* Scroll-Pfeil */
    #arrow {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3rem;
      animation: bounce 1.5s infinite ease-in-out;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    @keyframes bounce {
      0% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
      100% { transform: translateX(-50%) translateY(0); }
    }

    /* Floating hearts */
    .heart {
      position: fixed;
      bottom: -20px;
      color: #ff2d55;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0); opacity: 0.8; }
      100% { transform: translateY(-120vh) translateX(40px); opacity: 0; }
    }

    .section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
  </style>
</head>

<body>

  <h1 id="title">Für dich ❤️</h1>

  <div id="text1" class="typewriter"></div>

  <!-- Scroll-Pfeil -->
  <div id="arrow">⬇️</div>

  <!-- Frage -->
  <div class="section">
    <div id="frage" class="typewriter"></div>
  </div>

  <!-- Antwort -->
  <div class="section">
    <div id="antwort" class="typewriter"></div>
  </div>

  <script>
    // Floating hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (20 + Math.random() * 20) + "px";
      heart.style.animationDuration = (4 + Math.random() * 4) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 8000);
    }
    setInterval(createHeart, 400);

    // Schreibmaschinen-Funktion
    function typeWriter(element, text, speed = 40) {
      element.style.opacity = 1;
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        }
      }
      typing();
    }

    // Intro-Text
    const introText =
      "Diese kleine Website habe ich nur für dich gemacht.\n" +
      "Weil du mir wichtig bist. Weil du mein Herz schneller schlagen lässt.\n" +
      "Und weil ich dir zeigen wollte, wie viel du mir bedeutest.";

    window.addEventListener("load", () => {
      document.getElementById("title").style.opacity = 1;
      setTimeout(() => {
        typeWriter(document.getElementById("text1"), introText);
      }, 800);
    });

    // Scroll-Pfeil ausblenden
    const arrow = document.getElementById("arrow");
    window.addEventListener("scroll", () => {
      arrow.style.opacity = window.scrollY > 50 ? "0" : "1";
    });

    // Frage & Antwort beim Scrollen tippen
    let frageGetippt = false;
    let antwortGetippt = false;

    window.addEventListener("scroll", () => {
      const scroll = window.scrollY;
      const height = window.innerHeight;

      if (scroll > height * 0.5 && !frageGetippt) {
        frageGetippt = true;
        typeWriter(
          document.getElementById("frage"),
          "Was war der schönste Tag deines Lebens?"
        );
      }

      if (scroll > height * 1.5 && !antwortGetippt) {
        antwortGetippt = true;
        typeWriter(
          document.getElementById("antwort"),
          "Sonntag, 1. Mai – der Tag, an dem wir zusammengekommen sind ❤️"
        );
      }
    });
  </script>

</body>
</html>
