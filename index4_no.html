<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Das tut weh 💔</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #2c2c2c, #4a0e23, #000000);
      color: #ffb3c6;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      margin-top: 120px;
      padding: 40px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      width: 80%;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 20px;
      text-shadow: 0 5px 20px rgba(255,0,0,0.3);
    }

    p {
      font-size: 1.6rem;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    /* Broken heart animation */
    .broken-heart {
      font-size: 5rem;
      animation: break 1.5s ease forwards;
      opacity: 0;
    }

    @keyframes break {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1) rotate(15deg); }
    }
  </style>
</head>

<body>

  <div class="container" id="box">
    <div class="broken-heart">💔</div>
    <h1>Das tut weh…</h1>
    <p id="text"></p>
  </div>

  <script>
    function typeWriter(element, text, speed = 40) {
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        }
      }
      typing();
    }

    const message =
      "Ich hätte mir so sehr ein anderes Wort gewünscht…\n\n" +
      "Aber auch wenn es weh tut:\n" +
      "Ich bin froh, dass du ehrlich bist.\n" +
      "Und egal was passiert…\n" +
      "Du wirst immer etwas Besonderes für mich sein. 💔";

    window.addEventListener("load", () => {
      document.getElementById("box").style.opacity = 1;

      setTimeout(() => {
        typeWriter(document.getElementById("text"), message);
      }, 600);
    });
  </script>

</body>
</html>
